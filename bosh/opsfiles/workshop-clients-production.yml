# Client for the workshop team.
- type: replace
  path: /variables/-
  value:
    name: workshop_uaa_client_secret
    type: password

- type: replace
  path: /instance_groups/name=uaa/jobs/name=uaa/properties/uaa/clients/workshop?
  value:
    override: true
    scope: openid
    authorized-grant-types: authorization_code,refresh_token
    authorities: uaa.none
    access-token-validity: 600
    refresh-token-validity: 86400
    name: Workshop
    autoapprove: true
    show-on-homepage: true
    app-icon: ''
    app-launch-url: https://workshop.cloud.gov
    redirect-uri: https://workshop.cloud.gov/users/auth/94ae430d/callback
    secret: ((workshop_uaa_client_secret))
